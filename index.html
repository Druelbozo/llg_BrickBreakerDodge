<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="icon" type="image/x-icon" href="https://play.luckyladygames.com/favicon.ico">
	
	<title>Lucky Lady Games</title>
	<script type="module">
		// Set dynamic page title based on config file name from game-config.js
		(async function() {
			function formatConfigTitle(configName) {
				if (!configName) return 'Lucky Lady Games';
				
				// Split by dashes and underscores, then filter out empty strings
				const words = configName.split(/[-_]/).filter(w => w.length > 0);
				
				// Capitalize first letter of each word
				const formattedWords = words.map((word) => {
					return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
				});
				
				return formattedWords.join(' ');
			}
			
			try {
				// Import the config name from game-config.js
				const { configName } = await import('./src/config/game-config.js');
				const title = formatConfigTitle(configName);
				document.title = title;
			} catch (error) {
				// Silently fail - keep default title
				console.warn('Could not load game config for title:', error);
			}
		})();
	</script>

    <script src="https://cdn.jsdelivr.net/npm/phaser@v3.87.0/dist/phaser.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
	<script src="src/main.js" type="module"></script>

	<style>
		body {
			background: #2f2f2f;
			margin: 0;
			padding: 0;
		}
	</style>

</head>

</html>
