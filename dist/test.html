<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://play.luckyladygames.com/favicon.ico">
    <title>Brick Breaker Dodge - Game Config Test Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #141414;
            color: #e5e5e5;
            margin: 0;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            max-width: 400px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        
        .section {
            background: #1c1c1c;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .section-title {
            font-size: 1.8em;
            font-weight: 600;
            color: #d4d4d4;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #808080;
            letter-spacing: -0.01em;
        }
        
        .links-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        @media (min-width: 575px) {
            .links-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (min-width: 800px) {
            .links-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (min-width: 1100px) {
            .links-container {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        
        a {
            display: block;
            padding: 0;
            background: transparent;
            text-decoration: none;
            border-radius: 5px;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            overflow: hidden;
            aspect-ratio: 1;
        }
        
        a:hover {
            border-color: #ffca63;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 202, 99, 0.3);
        }
        
        a img,
        a video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        a .thumbnail-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        a .thumbnail-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }
        
        a .fallback-text {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #241773;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            border-radius: 8px;
        }
        
        .loading {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            background: #3a1a1a;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
  <script type="module" crossorigin src="./js/game-xNzUDff4.js"></script>
  <link rel="modulepreload" crossorigin href="./js/preload-helper-mg6Z-sIv.js">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="./assets/llg-newlogo-lite-CW-qpaO2.png" alt="Lucky Lady Games" class="logo" onerror="this.style.display='none'">
        </div>
        <div id="links-container" class="loading">Loading configs...</div>
    </div>

</body>
</html>
